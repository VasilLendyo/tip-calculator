<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>tip-calculator</title>
</head>
<body>
    <main class="container">
        <input class="inp" id="sumInput" type="number" placeholder="Введіть суму">
        <p>Введіть процент чайових:</p>
        <select class="sel" id="tip-percentage">
            <option value="5">5%</option>
            <option value="10">10%</option>
            <option value="15">15%</option>
            <option value="20">20%</option>
        </select>
        <input type="number" id="people" placeholder="Введіть к-сть людей">
        <button class="roz" id="calculate">Розрахунок</button>
        <div class="result" id="result"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
